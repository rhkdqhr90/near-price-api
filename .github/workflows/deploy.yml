name: API 배포 파이프라인

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: '배포 환경'
        required: true
        default: 'staging'
        type: choice
        options:
          - dev
          - staging
          - prod

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci --legacy-peer-deps

      - name: 린팅
        run: npm run lint
        continue-on-error: true

      - name: 테스트 실행
        run: npm test -- --forceExit
        continue-on-error: true

      - name: 빌드
        run: npm run build

      - name: 빌드 아티팩트 저장
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: dist/
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 35
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'ap-northeast-2' }}

      - name: 배포 환경 결정
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "instance_id=${{ secrets.PROD_EC2_INSTANCE_ID }}" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "instance_id=${{ secrets.STAGING_EC2_INSTANCE_ID }}" >> $GITHUB_OUTPUT
          fi

      - name: 배포 아카이브 생성 및 S3 업로드
        id: package
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          ARCHIVE_NAME="near-price-api-${SHORT_SHA}.tar.gz"
          ARCHIVE_KEY="deploy/${ARCHIVE_NAME}"
          git archive --format=tar.gz -o "$ARCHIVE_NAME" "$GITHUB_SHA"
          aws s3 cp "$ARCHIVE_NAME" "s3://${{ secrets.DEPLOY_S3_BUCKET }}/${ARCHIVE_KEY}"
          echo "archive_key=${ARCHIVE_KEY}" >> $GITHUB_OUTPUT

      - name: SSM 배포 실행
        id: ssm
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.env.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy near-price-api ${{ github.sha }} (${{ steps.env.outputs.environment }})" \
            --parameters commands="[
              \"set -euo pipefail\",
              \"DEPLOY_BUCKET=${{ secrets.DEPLOY_S3_BUCKET }}\",
              \"DEPLOY_KEY=${{ steps.package.outputs.archive_key }}\",
              \"TARGET_PATH=/home/ec2-user/near-price-api\",
              \"ARCHIVE_PATH=/tmp/near-price-api-deploy.tar.gz\",
              \"aws s3 cp s3://\\${DEPLOY_BUCKET}/\\${DEPLOY_KEY} \\${ARCHIVE_PATH}\",
              \"mkdir -p \\${TARGET_PATH}\",
              \"tar --no-same-owner -xzf \\${ARCHIVE_PATH} -C \\${TARGET_PATH}\",
              \"cd \\${TARGET_PATH}\",
              \"docker compose -f deploy/docker-compose.yml --env-file .env up -d --build api nginx\",
              \"docker exec near-price-api npm run typeorm:migration:run:prod\",
              \"for i in 1 2 3 4 5; do code=\\$(curl -s -o /tmp/health.out -w \\\"%{http_code}\\\" http://localhost/health || true); if [ \\\"\\${code}\\\" = \\\"200\\\" ]; then break; fi; sleep 2; done\",
              \"curl -s -o /tmp/price.out -w \\\"%{http_code}\\\" \\\"http://localhost/price/recent?page=1&limit=1\\\"\",
              \"cat /tmp/health.out\",
              \"cat /tmp/price.out\"
            ]" \
            --query 'Command.CommandId' \
            --output text)

          echo "command_id=${COMMAND_ID}" >> $GITHUB_OUTPUT

          for _ in {1..80}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${{ steps.env.outputs.instance_id }}" \
              --query 'Status' \
              --output text)
            echo "SSM status: ${STATUS}"
            if [ "${STATUS}" = "Success" ] || [ "${STATUS}" = "Failed" ] || [ "${STATUS}" = "Cancelled" ] || [ "${STATUS}" = "TimedOut" ]; then
              break
            fi
            sleep 15
          done

          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${{ steps.env.outputs.instance_id }}" \
            --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}'

          FINAL_STATUS=$(aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${{ steps.env.outputs.instance_id }}" \
            --query 'Status' \
            --output text)

          if [ "${FINAL_STATUS}" != "Success" ]; then
            echo "SSM deployment failed: ${FINAL_STATUS}"
            exit 1
          fi

      - name: 배포 알림 (성공)
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const commit = context.payload.head_commit || context.payload.pull_request.head.sha;
            const message = `✅ API 배포 성공\n환경: ${{ steps.env.outputs.environment }}\nCommit: ${commit?.message || 'N/A'}`;
            console.log(message);

      - name: 배포 알림 (실패)
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const message = `❌ API 배포 실패\n환경: ${{ steps.env.outputs.environment }}\n작업: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            console.log(message);
