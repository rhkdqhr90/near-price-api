name: API CD

on:
  repository_dispatch:
    types:
      - api_deploy_ready
  workflow_dispatch:
    inputs:
      image_uri:
        description: ECR image URI with digest (repo@sha256:...)
        required: true
        type: string
      source_s3_key:
        description: Source archive S3 key (deploy/source/...tar.gz)
        required: true
        type: string
      commit_sha:
        description: Commit SHA for deployment
        required: false
        type: string

concurrency:
  group: api-deploy-main
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID || '008967453433' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'near-price-api' }}
  DEPLOY_BUCKET: ${{ vars.DEPLOY_BUCKET || 'near-price-uploads-20260413105546966700000004' }}
  EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID || 'i-0a3d110162a4743c3' }}
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/home/ec2-user/near-price-api' }}
  ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_ARN || 'arn:aws:iam::008967453433:role/near-price-github-actions-deploy' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      id-token: write
    steps:
      - name: 배포 파라미터 준비
        id: params
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "repository_dispatch" ]; then
            IMAGE_URI="${{ github.event.client_payload.image_uri }}"
            SOURCE_S3_KEY="${{ github.event.client_payload.source_s3_key }}"
            COMMIT_SHA="${{ github.event.client_payload.commit_sha }}"
          else
            IMAGE_URI="${{ github.event.inputs.image_uri }}"
            SOURCE_S3_KEY="${{ github.event.inputs.source_s3_key }}"
            COMMIT_SHA="${{ github.event.inputs.commit_sha }}"
          fi

          if [ -z "${IMAGE_URI}" ] || [ -z "${SOURCE_S3_KEY}" ]; then
            echo "::error::Missing deployment parameters: image_uri/source_s3_key"
            exit 1
          fi

          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "source_s3_key=${SOURCE_S3_KEY}" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"
          echo "ecr_registry=${ECR_REGISTRY}" >> "$GITHUB_OUTPUT"

      - name: AWS OIDC 인증
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: SSM 배포 실행
        id: deploy
        env:
          IMAGE_URI: ${{ steps.params.outputs.image_uri }}
          SOURCE_S3_KEY: ${{ steps.params.outputs.source_s3_key }}
          ECR_REGISTRY: ${{ steps.params.outputs.ecr_registry }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          commands = [
            'set -euo pipefail',
            'PREV_IMAGE=$(docker inspect near-price-api --format "{{.Config.Image}}" 2>/dev/null || true)',
            f'aws s3 cp s3://{os.environ["DEPLOY_BUCKET"]}/{os.environ["SOURCE_S3_KEY"]} /tmp/near-price-api-source.tar.gz --region {os.environ["AWS_REGION"]}',
            f'mkdir -p {os.environ["DEPLOY_PATH"]}',
            f'tar --no-same-owner -xzf /tmp/near-price-api-source.tar.gz -C {os.environ["DEPLOY_PATH"]}',
            f'aws ecr get-login-password --region {os.environ["AWS_REGION"]} | docker login --username AWS --password-stdin {os.environ["ECR_REGISTRY"]}',
            f'PULL_OK=0; for attempt in 1 2 3; do timeout 3600 docker pull {os.environ["IMAGE_URI"]} && PULL_OK=1 && break; echo "docker pull failed (attempt ${attempt}/3), retrying..."; sleep $((attempt * 15)); done; if [ "$PULL_OK" -ne 1 ]; then echo "DOCKER_PULL_FAILED"; exit 124; fi',
            f'cd {os.environ["DEPLOY_PATH"]}',
            f'API_IMAGE={os.environ["IMAGE_URI"]} docker compose -f deploy/docker-compose.yml --env-file .env up -d --no-build api nginx',
            'timeout 600 docker exec near-price-api npm run typeorm:migration:run:prod',
            'healthy=0',
            'for i in $(seq 1 60); do if curl -fsS http://localhost/health >/dev/null; then healthy=1; break; fi; sleep 5; done',
            'if [ "$healthy" -eq 0 ]; then if [ -n "$PREV_IMAGE" ]; then API_IMAGE="$PREV_IMAGE" docker compose -f deploy/docker-compose.yml --env-file .env up -d --no-build api nginx; rollback_healthy=0; for i in $(seq 1 30); do if curl -fsS http://localhost/health >/dev/null; then rollback_healthy=1; break; fi; sleep 5; done; if [ "$rollback_healthy" -eq 1 ]; then echo "ROLLBACK_SUCCESS image=$PREV_IMAGE"; else echo "ROLLBACK_FAILED image=$PREV_IMAGE"; fi; fi; echo "DEPLOY_HEALTH_FAILED"; exit 1; fi',
            'rm -f /tmp/near-price-api-source.tar.gz',
            'echo "DEPLOY_SUCCESS"',
          ]

          Path('ssm-commands.json').write_text(
            json.dumps({'commands': commands}, ensure_ascii=True),
            encoding='utf-8',
          )
          PY

          COMMAND_ID=$(aws ssm send-command \
            --region "${AWS_REGION}" \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "deploy near-price-api ${GITHUB_SHA::7}" \
            --parameters file://ssm-commands.json \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"

      - name: SSM 배포 완료 대기
        id: wait
        env:
          COMMAND_ID: ${{ steps.deploy.outputs.command_id }}
        run: |
          set -euo pipefail

          STATUS=""
          for _ in {1..160}; do
            STATUS=$(aws ssm get-command-invocation \
              --region "${AWS_REGION}" \
              --command-id "${COMMAND_ID}" \
              --instance-id "${EC2_INSTANCE_ID}" \
              --query "Status" \
              --output text || true)

            if [ "${STATUS}" = "Success" ] || [ "${STATUS}" = "Cancelled" ] || [ "${STATUS}" = "TimedOut" ] || [ "${STATUS}" = "Failed" ]; then
              break
            fi

            sleep 15
          done

          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"

          aws ssm get-command-invocation \
            --region "${AWS_REGION}" \
            --command-id "${COMMAND_ID}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --query '{Status:Status,ResponseCode:ResponseCode,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}' \
            --output json > ssm-result.json

          cat ssm-result.json

          if [ "${STATUS}" = "Cancelled" ] || [ "${STATUS}" = "TimedOut" ] || [ "${STATUS}" = "Failed" ]; then
            echo "::error::SSM deployment failed"
            exit 1
          fi

          if [ "${STATUS}" != "Success" ]; then
            echo "::error::SSM command ended in unexpected status: ${STATUS}"
            exit 1
          fi

      - name: 배포 요약
        if: always()
        run: |
          echo "## API 배포 결과" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ steps.params.outputs.image_uri }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source: \`s3://${DEPLOY_BUCKET}/${{ steps.params.outputs.source_s3_key }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Instance: \`${EC2_INSTANCE_ID}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- SSM Command ID: \`${{ steps.deploy.outputs.command_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- SSM Status: \`${{ steps.wait.outputs.status }}\`" >> "$GITHUB_STEP_SUMMARY"
