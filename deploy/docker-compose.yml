# NearPrice API 프로덕션 배포 설정
# 사용법: docker-compose -f deploy/docker-compose.yml up -d

version: '3.8'

services:
  # PostgreSQL 데이터베이스
  postgres:
    image: postgres:17-alpine
    container_name: near-price-db
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      # 데이터 영속성
      - postgres_data:/var/lib/postgresql/data
      # 초기화 스크립트 (선택사항)
      # - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      # 외부 접근 불가능 (docker 네트워크에서만 접근)
      - "127.0.0.1:5432:5432"
    networks:
      - near-price-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis 캐싱 및 세션 저장소
  redis:
    image: redis:7-alpine
    container_name: near-price-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-your-secure-password} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      # Redis 데이터 영속성
      - redis_data:/data
    ports:
      # 외부 접근 불가능 (docker 네트워크에서만 접근)
      - "127.0.0.1:6379:6379"
    networks:
      - near-price-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Elasticsearch (검색 기능)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: near-price-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: false
      "ES_JAVA_OPTS": "-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "127.0.0.1:9200:9200"
    networks:
      - near-price-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # NestJS API 서버 (3개 인스턴스 로드밸런싱)
  api-1:
    build:
      context: ../
      dockerfile: deploy/Dockerfile
    container_name: near-price-api-1
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      ELASTICSEARCH_NODE: http://elasticsearch:9200
      CORS_ORIGIN: ${CORS_ORIGIN}
      KAKAO_REST_API_KEY: ${KAKAO_REST_API_KEY}
      KAKAO_API_URL: ${KAKAO_API_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - near-price-network
    restart: unless-stopped

  api-2:
    build:
      context: ../
      dockerfile: deploy/Dockerfile
    container_name: near-price-api-2
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      ELASTICSEARCH_NODE: http://elasticsearch:9200
      CORS_ORIGIN: ${CORS_ORIGIN}
      KAKAO_REST_API_KEY: ${KAKAO_REST_API_KEY}
      KAKAO_API_URL: ${KAKAO_API_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - near-price-network
    restart: unless-stopped

  api-3:
    build:
      context: ../
      dockerfile: deploy/Dockerfile
    container_name: near-price-api-3
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      ELASTICSEARCH_NODE: http://elasticsearch:9200
      CORS_ORIGIN: ${CORS_ORIGIN}
      KAKAO_REST_API_KEY: ${KAKAO_REST_API_KEY}
      KAKAO_API_URL: ${KAKAO_API_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - near-price-network
    restart: unless-stopped

  # Nginx 리버스 프록시
  nginx:
    image: nginx:alpine
    container_name: near-price-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # SSL 인증서 위치
      # - /etc/letsencrypt/live/api.nearprice.com/fullchain.pem:/etc/nginx/certs/api.nearprice.com.crt:ro
      # - /etc/letsencrypt/live/api.nearprice.com/privkey.pem:/etc/nginx/certs/api.nearprice.com.key:ro
      # 로그 디렉토리
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - api-1
      - api-2
      - api-3
    networks:
      - near-price-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  elasticsearch_data:
    driver: local

networks:
  near-price-network:
    driver: bridge
