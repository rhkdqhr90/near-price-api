# NearPrice API Nginx 설정
# 프로덕션 환경용 리버스 프록시 설정

# Upstream 서버 그룹 (여러 인스턴스 로드밸런싱)
upstream near_price_api {
  # 기본 설정: 단일 서버
  server localhost:3000;

  # 다중 서버 로드밸런싱 예시:
  # server api-1.example.com:3000 weight=1;
  # server api-2.example.com:3000 weight=1;
  # server api-3.example.com:3000 weight=1;

  # 연결 유지 설정
  keepalive 32;
}

# HTTP → HTTPS 리다이렉트
server {
  listen 80;
  server_name _;
  return 301 https://$host$request_uri;
}

# HTTPS 서버
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name api.nearprice.com;

  # SSL 인증서 설정 (Let's Encrypt 또는 자체 서명 인증서)
  ssl_certificate /etc/nginx/certs/api.nearprice.com.crt;
  ssl_certificate_key /etc/nginx/certs/api.nearprice.com.key;

  # SSL 보안 설정
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # HSTS 헤더 (HTTP Strict Transport Security)
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

  # 요청 크기 제한
  client_max_body_size 10m; # 파일 업로드 최대 크기
  client_body_timeout 30s;
  client_header_timeout 30s;

  # 연결 유지 시간
  keepalive_timeout 65;
  keepalive_requests 100;

  # 로깅 설정
  access_log /var/log/nginx/near-price-api.access.log;
  error_log /var/log/nginx/near-price-api.error.log warn;

  # 보안 헤더 (애플리케이션에서 설정하지만 추가 보안을 위해 Nginx에서도 설정)
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # CSP 헤더 (Content Security Policy)
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;

  # 정적 파일 서빙 (캐싱 설정)
  location /uploads/ {
    alias /var/www/near-price-api/uploads/;

    # 정적 파일 캐싱 (7일)
    expires 7d;
    add_header Cache-Control "public, immutable" always;

    # 접근 제어 (선택사항: 특정 IP만 허용)
    # allow all;
  }

  # 헬스체크 엔드포인트 (로드밸런서용)
  location /health {
    proxy_pass http://near_price_api;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    access_log off;
  }

  # API 프록시
  location / {
    # 업스트림 서버로 요청 전달
    proxy_pass http://near_price_api;

    # HTTP 버전 설정
    proxy_http_version 1.1;

    # 헤더 설정
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Connection "";

    # 웹소켓 지원 (필요한 경우)
    # proxy_set_header Upgrade $http_upgrade;
    # proxy_set_header Connection "upgrade";

    # 타임아웃 설정
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # 버퍼링 설정
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;
  }

  # 404 처리
  error_page 404 /404.json;
  location = /404.json {
    internal;
    default_type application/json;
    return 404 '{"statusCode":404,"message":"Not found","timestamp":"'$(date -u +'%Y-%m-%dT%H:%M:%SZ')'"}';
  }
}

# 로깅 설정 (선택사항: 각 서버별 로그 포맷)
log_format near_price_log
  '$remote_addr - $remote_user [$time_local] '
  '"$request" $status $body_bytes_sent '
  '"$http_referer" "$http_user_agent" '
  'upstream_addr=$upstream_addr upstream_status=$upstream_status '
  'request_time=$request_time upstream_response_time=$upstream_response_time';
